<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Mateusz Siuba</title>
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #f9fafb;
      font-family: 'Inter', system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-size: 7rem;
      font-weight: 900;
      background: linear-gradient(135deg, #10b981, #1e40af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #f9fafb; }
    p  { color: #9ca3af; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, #10b981, #1e40af);
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: scale(1.03); }
    .timer { margin-top: 1.25rem; font-size: 0.875rem; color: #6b7280; }
    #countdown { color: #10b981; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist.<br/>You'll be redirected to the homepage shortly.</p>
    <a class="btn" href="/Portfolio/">
      ← Go to homepage
    </a>
    <p class="timer">Redirecting in <span id="countdown">5</span>s…</p>
  </div>
  <script>
    var n = 5;
    var el = document.getElementById('countdown');
    var interval = setInterval(function () {
      n--;
      el.textContent = n;
      if (n <= 0) { clearInterval(interval); window.location.href = '/Portfolio/'; }
    }, 1000);
  </script>
</body>
</html>
